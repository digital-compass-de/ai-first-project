# Apache SSL Configuration for lisacloud.site
# Created: 2026-04-04
# Based on Apache 2.4 SSL How-To

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName lisacloud.site
        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html

        # SSL Engine
        SSLEngine on

        # Certificate files
        SSLCertificateFile /etc/ssl/certs/lisacloud.site.crt
        SSLCertificateKeyFile /etc/ssl/private/lisacloud.site.key

        # Modern SSL Configuration
        SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite HIGH:!aNULL:!MD5
        SSLHonorCipherOrder on

        # Security Headers
        Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
        Header always set X-Frame-Options DENY
        Header always set X-Content-Type-Options nosniff

        # Logging
        ErrorLog ${APACHE_LOG_DIR}/ssl-error.log
        CustomLog ${APACHE_LOG_DIR}/ssl-access.log combined

        # Document Root Configuration
        <Directory /var/www/html>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>
    </VirtualHost>
</IfModule>

# HTTP to HTTPS Redirect
<VirtualHost *:80>
    ServerName lisacloud.site
    ServerAlias www.lisacloud.site
    
    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>
